# IMPL-CI-02 — deploy to AWS on merge to main (ARCH-13/14, TR-REL-01).
#
# Requires (configure in the repo, once):
#   - vars.AWS_REGION, vars.AWS_ACCOUNT_ID, vars.DEPLOY_ENV (dev|prod)
#   - secrets.AWS_DEPLOY_ROLE_ARN — an IAM role trusting this repo via GitHub
#     OIDC (no long-lived keys). It needs permission to push to ECR, run
#     CloudFormation/CDK, and write to the SPA S3 bucket + CloudFront.
#   - A GitHub environment named after DEPLOY_ENV for approval/protection.
#
# NOTE: this pipeline is authored but has not been run (no AWS account here).
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # OIDC
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOY_ENV }}
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      DEPLOY_ENV: ${{ vars.DEPLOY_ENV }}
      ECR_REPO: finance-tracker-backend-${{ vars.DEPLOY_ENV }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- 1. Build & push the backend image (pinned to the commit SHA) ---
      # The ECR repo is created by the Api stack; on a first-ever deploy, run
      # `cdk deploy ...Api` once before this workflow so the repo exists.
      - name: Build & push backend image
        run: |
          REGISTRY="${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          IMAGE="$REGISTRY/$ECR_REPO:${{ github.sha }}"
          aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$REGISTRY"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"

      # --- 2. Deploy the infrastructure, pinning the Lambda to that image ---
      - name: CDK deploy
        working-directory: infrastructure
        run: |
          npm ci
          npx cdk deploy --all --require-approval never \
            -c env=$DEPLOY_ENV \
            -c imageTag=${{ github.sha }}

      # --- 3. Database migrations ---
      # RDS is in private subnets and unreachable from a GitHub runner, so
      # `alembic upgrade head` cannot run here directly. Run it from inside the
      # VPC (self-hosted runner, CodeBuild-in-VPC, or a one-off task using the
      # same image). See infrastructure/README.md. Left as an explicit operator
      # step rather than a broken automated one.
      - name: Database migrations (manual — see note above)
        run: echo "Run 'alembic upgrade head' from within the VPC — see infrastructure/README.md"

      # --- 4. Build the SPA with the deployed Cognito settings & publish it ---
      - name: Read stack outputs
        id: outputs
        run: |
          get() { aws cloudformation describe-stacks --stack-name "$1" \
            --query "Stacks[0].Outputs[?OutputKey=='$2'].OutputValue" --output text; }
          echo "user_pool_id=$(get FinanceTracker-$DEPLOY_ENV-Auth UserPoolId)" >> "$GITHUB_OUTPUT"
          echo "client_id=$(get FinanceTracker-$DEPLOY_ENV-Auth UserPoolClientId)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(get FinanceTracker-$DEPLOY_ENV-Edge DistributionId)" >> "$GITHUB_OUTPUT"
          echo "site_bucket=$(get FinanceTracker-$DEPLOY_ENV-Edge SiteBucketName)" >> "$GITHUB_OUTPUT"

      - name: Build SPA
        working-directory: frontend
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.outputs.outputs.user_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.outputs.outputs.client_id }}
          VITE_COGNITO_REGION: ${{ vars.AWS_REGION }}
        run: |
          npm ci
          npm run build

      - name: Publish SPA to S3 + invalidate CloudFront
        run: |
          aws s3 sync frontend/dist "s3://${{ steps.outputs.outputs.site_bucket }}" --delete
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.distribution_id }}" \
            --paths "/*"
