[alembic]
script_location = app/db/migrations
prepend_sys_path = .

# sqlalchemy.url is intentionally left unset here — app/db/migrations/env.py
# injects it at runtime from app.core.config.settings, so the DSN (which may
# contain credentials) lives in exactly one place (TR-SEC-03).

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
