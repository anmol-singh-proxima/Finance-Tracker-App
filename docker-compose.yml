# Local development stack for the target architecture: Postgres + the FastAPI
# backend. The frontend runs separately via Vite (`cd frontend && npm run dev`),
# proxying /api to the backend on :8000. Cognito is a real AWS resource — see
# backend/README.md for how to create a pool and set COGNITO_* (from a root .env,
# which Compose auto-loads).
services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: finance-tracker-db
    environment:
      - POSTGRES_USER=finance_user
      - POSTGRES_PASSWORD=finance_password
      - POSTGRES_DB=finance_tracker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finance-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finance_user -d finance_tracker']
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI backend (mirrors the container image deployed to Lambda in prod).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-tracker-backend
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql+psycopg://finance_user:finance_password@postgres:5432/finance_tracker
      - COGNITO_USER_POOL_ID=${COGNITO_USER_POOL_ID}
      - COGNITO_REGION=${COGNITO_REGION:-us-east-1}
      - COGNITO_APP_CLIENT_ID=${COGNITO_APP_CLIENT_ID}
      - ENVIRONMENT=local
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-network
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
    driver: local

networks:
  finance-network:
    driver: bridge
