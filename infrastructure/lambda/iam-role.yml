AWSTemplateFormatVersion: '2010-09-09'
Description: 'IAM Roles and Policies for Lambda Functions'

Parameters:
  Environment:
    Type: String
    Default: development
    AllowedValues: [development, staging, production]

Resources:
  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole'
      Path: /
      Tags:
        - Key: Name
          Value: !Sub 'finance-tracker-lambda-role-${Environment}'
        - Key: Environment
          Value: !Ref Environment

  # Policy for CloudWatch Logs
  LambdaCloudWatchLogsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaCloudWatchLogsPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
            Resource: 'arn:aws:logs:*:*:*'
      Roles:
        - !Ref LambdaExecutionRole

  # Policy for RDS Database Access
  LambdaRDSAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaRDSAccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'rds-db:connect'
            Resource: 'arn:aws:rds:*:*:db/*'
          - Effect: Allow
            Action:
              - 'rds:DescribeDBClusters'
              - 'rds:DescribeDBInstances'
            Resource: '*'
      Roles:
        - !Ref LambdaExecutionRole

  # Policy for Secrets Manager (for storing DB credentials)
  LambdaSecretsManagerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaSecretsManagerPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'secretsmanager:GetSecretValue'
              - 'secretsmanager:DescribeSecret'
            Resource: !Sub 'arn:aws:secretsmanager:*:*:secret:finance-tracker/*'
      Roles:
        - !Ref LambdaExecutionRole

  # Policy for X-Ray (optional, for tracing)
  LambdaXRayPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaXRayPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'xray:PutTraceSegments'
              - 'xray:PutTelemetryRecords'
            Resource: '*'
      Roles:
        - !Ref LambdaExecutionRole

  # Policy for DynamoDB Access (if using DynamoDB instead of RDS)
  LambdaDynamoDBPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: LambdaDynamoDBPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'dynamodb:GetItem'
              - 'dynamodb:PutItem'
              - 'dynamodb:UpdateItem'
              - 'dynamodb:DeleteItem'
              - 'dynamodb:Query'
              - 'dynamodb:Scan'
            Resource: !Sub 'arn:aws:dynamodb:*:*:table/finance-tracker-*'
      Roles:
        - !Ref LambdaExecutionRole

  # ECS Task Execution Role
  ECSTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy'
      Path: /
      Tags:
        - Key: Name
          Value: !Sub 'finance-tracker-ecs-task-role-${Environment}'

  # ECS Task Role
  ECSTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: 'sts:AssumeRole'
      Path: /
      Tags:
        - Key: Name
          Value: !Sub 'finance-tracker-ecs-role-${Environment}'

  # Policy for ECS to invoke Lambda
  ECSInvokeLambdaPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ECSInvokeLambdaPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'lambda:InvokeFunction'
            Resource: !Sub 'arn:aws:lambda:*:*:function:finance-tracker-*'
      Roles:
        - !Ref ECSTaskRole

  # Policy for ECS to access CloudWatch Logs
  ECSCloudWatchLogsPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ECSCloudWatchLogsPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'logs:CreateLogGroup'
              - 'logs:CreateLogStream'
              - 'logs:PutLogEvents'
            Resource: 'arn:aws:logs:*:*:*'
      Roles:
        - !Ref ECSTaskRole

  # Policy for ECS to pull from ECR
  ECSECRAccessPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ECSECRAccessPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'ecr:GetAuthorizationToken'
              - 'ecr:BatchGetImage'
              - 'ecr:GetDownloadUrlForLayer'
            Resource: '*'
      Roles:
        - !Ref ECSTaskExecutionRole

  # Policy for ECS to access Secrets Manager
  ECSSecretsManagerPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: ECSSecretsManagerPolicy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - 'secretsmanager:GetSecretValue'
              - 'secretsmanager:DescribeSecret'
            Resource: !Sub 'arn:aws:secretsmanager:*:*:secret:finance-tracker/*'
      Roles:
        - !Ref ECSTaskRole

Outputs:
  LambdaExecutionRoleArn:
    Description: Lambda Execution Role ARN
    Value: !GetAtt LambdaExecutionRole.Arn
    Export:
      Name: !Sub 'FinanceTrackerLambdaRoleArn-${Environment}'

  ECSTaskExecutionRoleArn:
    Description: ECS Task Execution Role ARN
    Value: !GetAtt ECSTaskExecutionRole.Arn
    Export:
      Name: !Sub 'FinanceTrackerECSTaskExecutionRoleArn-${Environment}'

  ECSTaskRoleArn:
    Description: ECS Task Role ARN
    Value: !GetAtt ECSTaskRole.Arn
    Export:
      Name: !Sub 'FinanceTrackerECSTaskRoleArn-${Environment}'
